name: CI



on:

  push:

    branches: [main, master]

  pull_request:

    branches: [main, master]



jobs:

  lint-and-test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4



      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"



      - name: Install package

        run: pip install -e ".[dev]"



      - name: Ruff

        run: ruff check src tests



      - name: Pytest

        run: pytest tests/ -q



  web-build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4



      - uses: actions/setup-node@v4

        with:

          node-version: "22"

          cache: npm

          cache-dependency-path: web/package.json



      - name: Build web UI

        working-directory: web

        run: |

          npm install

          npm run build



  docker-build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4



      - name: Build image

        run: docker build -t poe-wiki-agent:ci .

